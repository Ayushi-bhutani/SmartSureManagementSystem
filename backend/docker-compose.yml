version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: smartsure_rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq


  # Optional: If you don't already have SQL Server installed locally
  # sqlserver:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   container_name: smartsure_sql
  #   ports:
  #     - "1433:1433"
  #   environment:
  #     ACCEPT_EULA: "Y"
  #     MSSQL_SA_PASSWORD: "Your_Super_Secret_Password_123!"
  #   volumes:
  #     - sqlserver_data:/var/opt/mssql

volumes:
  rabbitmq_data:
  sqlserver_data:
